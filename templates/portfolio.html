<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | PokePop Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{--red:#CC0000;--blue:#1B4F9E;--yellow:#FFD700;--dark:#1A1A2E;--bg:#EDF2F7;
      --border:#CBD5E0;--text:#1A202C;--muted:#718096;--pixel:'Press Start 2P',monospace;
      --green:#16A34A;--rose:#DC2626;}
    *{box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    .panel{background:white;border:1.5px solid var(--border);border-radius:12px;}
    /* shared nav */
    .topnav{background:linear-gradient(135deg,#1D4ED8 0%,#2563EB 55%,#3B82F6 100%);border-bottom:3px solid var(--yellow);}
    .nav-tab{font-family:var(--pixel);font-size:8px;color:#BFDBFE;padding:10px 16px;border-bottom:3px solid transparent;cursor:pointer;text-decoration:none;white-space:nowrap;}
    .nav-tab:hover{color:#fff;}
    .nav-tab.active{color:var(--yellow);border-bottom-color:var(--yellow);}
    .chart-wrap{position:relative;height:340px;}
    .pnl-pos{color:var(--green);} .pnl-neg{color:var(--rose);}
    /* shimmer skeletons for loading states */
    @keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
    .skel{display:inline-block;border-radius:6px;
      background:linear-gradient(90deg,#EDF1F6 25%,#E2E8F0 37%,#EDF1F6 63%);
      background-size:800px 100%;animation:shimmer 1.3s linear infinite;color:transparent!important;}
    .spinner-ring{width:30px;height:30px;border:3px solid #E2E8F0;border-top-color:var(--blue);
      border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  {% include 'nav.html' %}

  <div class="max-w-6xl mx-auto px-4 py-6">
    <!-- Summary cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
      <div class="panel p-4">
        <div style="font-family:var(--pixel);font-size:6px;color:var(--muted)">TOTAL VALUE</div>
        <div id="pf-value" class="text-2xl font-bold mt-2"><span class="skel" style="width:120px;height:26px">…</span></div>
        <div id="pf-day" class="text-xs mt-1" style="color:var(--muted)"></div>
      </div>
      <div class="panel p-4">
        <div style="font-family:var(--pixel);font-size:6px;color:var(--muted)">COST BASIS</div>
        <div id="pf-cost" class="text-2xl font-bold mt-2"><span class="skel" style="width:100px;height:26px">…</span></div>
        <div id="pf-count" class="text-xs mt-1" style="color:var(--muted)"></div>
      </div>
      <div class="panel p-4">
        <div style="font-family:var(--pixel);font-size:6px;color:var(--muted)">UNREALIZED P&L</div>
        <div id="pf-pnl" class="text-2xl font-bold mt-2"><span class="skel" style="width:110px;height:26px">…</span></div>
        <div id="pf-pnl-pct" class="text-xs mt-1"></div>
      </div>
      <div class="panel p-4">
        <div style="font-family:var(--pixel);font-size:6px;color:var(--muted)">DAY CHANGE</div>
        <div id="pf-daychg" class="text-2xl font-bold mt-2"><span class="skel" style="width:90px;height:26px">…</span></div>
        <div class="text-xs mt-1" style="color:var(--muted)">vs last snapshot</div>
      </div>
    </div>

    <!-- Value graph -->
    <div class="panel p-4 mb-5">
      <div class="flex items-center justify-between mb-2">
        <span style="font-family:var(--pixel);font-size:9px;">PORTFOLIO VALUE</span>
        <div id="pf-tf" class="flex gap-1"></div>
      </div>
      <div class="chart-wrap"><canvas id="pf-chart"></canvas>
        <div id="pf-loading" class="absolute inset-0 flex items-center justify-center"><div class="spinner-ring"></div></div>
        <div id="pf-empty" class="hidden absolute inset-0 flex items-center justify-center text-sm" style="color:var(--muted)">
          Value history builds daily as prices refresh — check back tomorrow.
        </div>
      </div>
    </div>

    <!-- Holdings -->
    <div class="panel overflow-hidden">
      <div style="background:linear-gradient(135deg,var(--dark),#0F3460);padding:10px 16px;border-bottom:2px solid var(--yellow);">
        <span style="font-family:var(--pixel);font-size:8px;color:var(--yellow)">HOLDINGS</span>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr style="background:#F7FAFC;color:var(--muted);font-size:11px;text-align:left;">
            <th class="px-3 py-2">Card</th><th class="px-3 py-2">Cond</th>
            <th class="px-3 py-2 text-center">Qty</th>
            <th class="px-3 py-2 text-right">Unit</th><th class="px-3 py-2 text-right">Value</th>
            <th class="px-3 py-2 text-right">Day Δ</th>
            <th class="px-3 py-2 text-right" title="Gain vs the market value when you added it">Since Added</th>
            <th class="px-3 py-2 text-right">Cost</th><th class="px-3 py-2 text-right">P&L</th>
          </tr></thead>
          <tbody id="pf-holdings"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
const money = v => v == null ? '—' : '$' + Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
let pfData = null, pfChart = null, pfTf = 90;

function skeletonRows(n) {
  const cell = w => `<td class="px-3 py-3"><span class="skel" style="width:${w}px;height:13px">.</span></td>`;
  return Array.from({length:n}).map(() =>
    `<tr style="border-top:1px solid var(--border)">${cell(150)}${cell(42)}
     <td class="px-3 py-3 text-center"><span class="skel" style="width:20px;height:13px">.</span></td>
     ${[64,72,52,64,52,72].map(w=>`<td class="px-3 py-3 text-right"><span class="skel" style="width:${w}px;height:13px">.</span></td>`).join('')}</tr>`
  ).join('');
}

async function loadPortfolio() {
  document.getElementById('pf-holdings').innerHTML = skeletonRows(4);
  try {
    const r = await fetch('/api/portfolio');
    pfData = await r.json();
  } catch { return; }
  const d = pfData;
  document.getElementById('pf-value').textContent = money(d.currentValue);
  document.getElementById('pf-cost').textContent = money(d.costBasis);
  document.getElementById('pf-count').textContent = `${d.count} cards`;

  const pnlEl = document.getElementById('pf-pnl'), pctEl = document.getElementById('pf-pnl-pct');
  pnlEl.textContent = (d.unrealizedPnl >= 0 ? '+' : '') + money(d.unrealizedPnl);
  pnlEl.className = 'text-2xl font-bold mt-2 ' + (d.unrealizedPnl >= 0 ? 'pnl-pos' : 'pnl-neg');
  if (d.unrealizedPnlPct != null) {
    pctEl.textContent = (d.unrealizedPnlPct >= 0 ? '+' : '') + d.unrealizedPnlPct + '%';
    pctEl.className = 'text-xs mt-1 ' + (d.unrealizedPnlPct >= 0 ? 'pnl-pos' : 'pnl-neg');
  }
  const dc = document.getElementById('pf-daychg'), dsub = document.getElementById('pf-day');
  if (d.dayChange != null) {
    dc.textContent = (d.dayChange >= 0 ? '+' : '') + money(d.dayChange);
    dc.className = 'text-2xl font-bold mt-2 ' + (d.dayChange >= 0 ? 'pnl-pos' : 'pnl-neg');
    if (d.dayChangePct != null) dsub.textContent = (d.dayChangePct >= 0 ? '+' : '') + d.dayChangePct + '% today';
  } else {
    dc.textContent = '—';                       // clear the skeleton when no prior snapshot yet
    dc.className = 'text-2xl font-bold mt-2';
  }
  renderTf();
  renderChart();
  renderHoldings();
}

function renderTf() {
  const el = document.getElementById('pf-tf');
  el.innerHTML = [[1,'1D'],[30,'1M'],[90,'3M'],[180,'6M'],[365,'1Y'],[0,'ALL']].map(([d,l]) =>
    `<button onclick="pfTf=${d};renderTf();renderChart()" style="padding:3px 9px;font-family:var(--pixel);font-size:6px;border-radius:5px;border:1.5px solid var(--border);cursor:pointer;${pfTf===d?'background:var(--dark);color:var(--yellow);border-color:var(--dark);':'background:#fff;color:var(--muted);'}">${l}</button>`
  ).join('');
}

function renderChart() {
  document.getElementById('pf-loading').classList.add('hidden');
  const series = pfData?.series || [];
  let pts;
  if (pfTf === 1) {
    // 1-day view: the last two daily snapshots so the day's move shows as a line.
    pts = series.slice(-2).map(s => ({ x: new Date(s.date).getTime(), y: s.value }));
  } else {
    const cutoff = pfTf > 0 ? Date.now() - pfTf*86400000 : 0;
    pts = series.filter(s => !cutoff || new Date(s.date).getTime() >= cutoff)
                .map(s => ({ x: new Date(s.date).getTime(), y: s.value }));
  }
  const empty = document.getElementById('pf-empty');
  if (pfChart) { pfChart.destroy(); pfChart = null; }
  // Need a few real days before a trend line is meaningful (early on, daily
  // snapshots are still filling in — a 2-point line would mislead).
  const distinctDays = new Set(pts.map(p => new Date(p.x).toISOString().slice(0,10))).size;
  if (pts.length < 2 || distinctDays < 3) { empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');
  const up = pts[pts.length-1].y >= pts[0].y;
  const color = up ? '#16A34A' : '#DC2626';
  pfChart = new Chart(document.getElementById('pf-chart').getContext('2d'), {
    type:'line', data:{datasets:[{ data:pts, borderColor:color, borderWidth:2.5,
      pointRadius:0, pointHoverRadius:5, fill:true, tension:0.35,
      backgroundColor:c=>{const a=c.chart.chartArea;if(!a)return color+'11';
        const g=c.chart.ctx.createLinearGradient(0,a.top,0,a.bottom);
        g.addColorStop(0,color+'30');g.addColorStop(1,color+'02');return g;} }]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
      tooltip:{callbacks:{title:i=>new Date(i[0].parsed.x).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}),
        label:c=>'Value: '+money(c.parsed.y)}}},
      scales:{x:{type:'linear',grid:{color:'#EEF2F6'},ticks:{color:'#94A3B8',maxTicksLimit:7,font:{size:11},
        callback:v=>new Date(v).toLocaleDateString('en-US',{month:'short',day:'numeric'})}},
        y:{grid:{color:'#EEF2F6'},ticks:{color:'#94A3B8',font:{size:11},callback:v=>'$'+(v>=1000?(v/1000).toFixed(1)+'k':v.toFixed(0))}}}}});
}

function renderHoldings() {
  const tb = document.getElementById('pf-holdings');
  const h = pfData?.holdings || [];
  if (!h.length) { tb.innerHTML = `<tr><td colspan="9" class="px-3 py-8 text-center" style="color:var(--muted)">No cards yet — <a href="/collection" style="color:var(--blue)">add some</a>.</td></tr>`; return; }
  tb.innerHTML = h.map(c => {
    const pnlCls = c.pnl == null ? '' : (c.pnl >= 0 ? 'pnl-pos' : 'pnl-neg');
    const pnlTxt = c.pnl == null ? '—' : `${c.pnl>=0?'+':''}${money(c.pnl)}${c.pnl_pct!=null?` (${c.pnl_pct>=0?'+':''}${c.pnl_pct}%)`:''}`;
    const dc = c.day_change, dcp = c.day_change_pct;
    const dcCls = dc == null ? '' : (dc >= 0 ? 'pnl-pos' : 'pnl-neg');
    const dcTxt = dc == null ? '—'
      : `${dc>=0?'+':''}${money(dc)}${dcp!=null?`<div style="font-size:11px">${dcp>=0?'+':''}${dcp}%</div>`:''}`;
    const sa = c.gain_since_add, sap = c.gain_since_add_pct;
    const saCls = sa == null ? '' : (sa >= 0 ? 'pnl-pos' : 'pnl-neg');
    const saTxt = sa == null ? '—'
      : `${sa>=0?'+':''}${money(sa)}${sap!=null?`<div style="font-size:11px">${sap>=0?'+':''}${sap}%</div>`:''}`
        + (c.value_at_add!=null?`<div style="font-size:10px;color:var(--muted)">@ ${money(c.value_at_add)}${c.tracked_since?' · '+c.tracked_since:''}</div>`:'');
    const link = c.card_id ? `/market?card=${encodeURIComponent(c.card_id)}` : null;
    return `<tr style="border-top:1px solid var(--border)">
      <td class="px-3 py-2">
        <div class="flex items-center gap-2">
          ${c.image_url?`<img src="${esc(c.image_url)}" style="width:30px;border-radius:4px;cursor:pointer" onclick="if('${link}'!=='null')location.href='${link}'">`:''}
          <div>
            <div class="font-semibold" ${link?`style="cursor:pointer;color:var(--blue)" onclick="location.href='${link}'"`:''}>${esc(c.name)}</div>
            <div class="text-xs" style="color:var(--muted)">${esc(c.set_name||'')}${c.number?' · #'+esc(c.number):''}</div>
          </div>
        </div>
      </td>
      <td class="px-3 py-2 text-xs">${esc(c.condition||'')}</td>
      <td class="px-3 py-2 text-center">${c.quantity}</td>
      <td class="px-3 py-2 text-right">${money(c.unit_value)}</td>
      <td class="px-3 py-2 text-right font-semibold">${money(c.market_value)}</td>
      <td class="px-3 py-2 text-right font-semibold ${dcCls}">${dcTxt}</td>
      <td class="px-3 py-2 text-right font-semibold ${saCls}">${saTxt}</td>
      <td class="px-3 py-2 text-right" style="color:var(--muted)">${money(c.cost_basis)}</td>
      <td class="px-3 py-2 text-right font-semibold ${pnlCls}">${pnlTxt}</td>
    </tr>`;
  }).join('');
}

loadPortfolio();
</script>
</body>
</html>
