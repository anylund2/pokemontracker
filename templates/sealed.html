<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sealed | PokePop Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{--red:#CC0000;--blue:#1B4F9E;--yellow:#FFD700;--dark:#1A1A2E;--bg:#EDF2F7;
      --border:#CBD5E0;--text:#1A202C;--muted:#718096;--pixel:'Press Start 2P',monospace;
      --green:#16A34A;--rose:#DC2626;}
    *{box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
    .panel{background:white;border:1.5px solid var(--border);border-radius:12px;}
    input,select{background:#FAFAFA;border:1.5px solid var(--border);color:var(--text);outline:none;border-radius:6px;padding:8px 12px;}
    .seal-card{cursor:pointer;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;background:white;transition:box-shadow .15s,transform .15s;}
    .seal-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12);transform:translateY(-2px);border-color:var(--blue);}
    .type-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;background:#EBF4FF;color:#1D4ED8;}
    .chart-wrap{position:relative;height:300px;}
    .tf-btn{padding:3px 9px;font-family:var(--pixel);font-size:6px;border-radius:5px;border:1.5px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;}
    .tf-btn.active{background:var(--dark);color:var(--yellow);border-color:var(--dark);}
  </style>
</head>
<body>
  {% include 'nav.html' %}

  <div class="max-w-6xl mx-auto px-4 py-5">
    <div class="panel p-4 mb-4 flex flex-wrap gap-3 items-center">
      <h1 style="font-family:var(--pixel);font-size:11px;flex-shrink:0;">SEALED PRODUCTS</h1>
      <input id="seal-search" type="text" placeholder="Search sealed — Evolving Skies Booster Box, Crown Zenith ETB…"
        class="flex-1" style="min-width:220px;" onkeydown="if(event.key==='Enter')doSealedSearch()" />
      <div class="cs-host"><select id="seal-set" onchange="loadSet()"><option value="">Browse by set…</option></select></div>
    </div>

    <div class="flex gap-4" style="align-items:flex-start;">
      <!-- Product grid -->
      <div class="flex-1 min-w-0">
        <div id="seal-grid-title" style="font-family:var(--pixel);font-size:8px;color:var(--muted);margin-bottom:8px;">Pick a set or search to see sealed products</div>
        <div id="seal-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;"></div>
      </div>

      <!-- Detail panel -->
      <div class="panel flex-shrink-0 p-4 hidden" id="seal-detail" style="width:420px;position:sticky;top:12px;">
        <div class="flex gap-3 items-start">
          <img id="sd-img" src="" style="width:90px;border-radius:6px;flex-shrink:0;box-shadow:0 2px 10px rgba(0,0,0,.15);" onerror="this.style.display='none'"/>
          <div class="flex-1 min-w-0">
            <div id="sd-name" class="font-bold text-sm"></div>
            <div id="sd-set" class="text-xs mt-1" style="color:var(--muted)"></div>
            <div class="flex gap-3 mt-3">
              <div><div style="font-family:var(--pixel);font-size:6px;color:var(--muted)" id="sd-tcg-lbl">TCG MARKET</div><div id="sd-tcg" class="text-lg font-bold" style="color:#2563EB"></div></div>
              <div><div style="font-family:var(--pixel);font-size:6px;color:var(--muted)">eBay MEDIAN</div><div id="sd-ebay" class="text-lg font-bold" style="color:var(--green)"></div></div>
            </div>
            <div id="sd-ebay-meta" class="text-xs mt-1" style="color:var(--muted)"></div>
          </div>
        </div>
        <a id="sd-buy" href="#" target="_blank" class="block text-center mt-3" style="background:#F37A1F;color:#fff;font-weight:700;padding:7px;border-radius:8px;text-decoration:none;font-size:13px;">View on TCGplayer →</a>

        <div class="flex items-center justify-between mt-4 mb-1">
          <span style="font-family:var(--pixel);font-size:8px;">PRICE HISTORY</span>
        </div>
        <div class="chart-wrap"><canvas id="sd-chart"></canvas>
          <div id="sd-empty" class="hidden absolute inset-0 flex items-center justify-center text-sm" style="color:var(--muted)">No recent price history</div>
        </div>

        <div style="font-family:var(--pixel);font-size:7px;color:var(--muted);margin:12px 0 6px;">RECENT eBay SOLD</div>
        <div id="sd-sales" style="max-height:220px;overflow-y:auto;"></div>
      </div>
    </div>
  </div>

<script>
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
const money = v => v == null ? '—' : '$' + Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
let sdChart = null;

async function initSets() {
  try {
    const sets = await (await fetch('/api/sealed/sets')).json();
    const sel = document.getElementById('seal-set');
    sets.forEach(s => {
      const o = document.createElement('option'); o.value = s.name;
      o.textContent = `${s.name} (${s.count})`; sel.appendChild(o);
    });
  } catch {}
}

function renderGrid(products, title) {
  document.getElementById('seal-grid-title').textContent = title;
  const grid = document.getElementById('seal-grid');
  if (!products.length) { grid.innerHTML = `<div style="grid-column:1/-1;color:var(--muted);padding:16px;">No sealed products found.</div>`; return; }
  grid.innerHTML = '';
  products.forEach(p => {
    const div = document.createElement('div');
    div.className = 'seal-card';
    div.innerHTML = `
      <img src="${esc(p.image)}" style="width:100%;background:#F1F5F9;" onerror="this.style.opacity=0.2"/>
      <div style="padding:8px">
        <div class="type-badge">${esc(p.type)}</div>
        <div style="font-size:12px;font-weight:600;margin-top:5px;line-height:1.25;">${esc(p.name)}</div>
        <div style="font-size:14px;font-weight:800;color:var(--green);margin-top:4px;">${money(p.marketPrice)}${p.priceType==='listed' ? '<span style="font-size:9px;color:var(--muted);font-weight:600;"> listed</span>' : ''}</div>
      </div>`;
    div.onclick = () => openProduct(p);
    grid.appendChild(div);
  });
}

async function loadSet() {
  const setName = document.getElementById('seal-set').value;
  if (!setName) return;
  document.getElementById('seal-grid').innerHTML = `<div style="grid-column:1/-1;color:var(--muted);padding:16px;">⏳ Loading…</div>`;
  try {
    const d = await (await fetch('/api/sealed/by-set?' + new URLSearchParams({set_name: setName}))).json();
    renderGrid(d.products || [], `${setName.toUpperCase()} — ${d.count} sealed products`);
  } catch { renderGrid([], 'Error loading set'); }
}

async function doSealedSearch() {
  const q = document.getElementById('seal-search').value.trim();
  if (!q) return;
  document.getElementById('seal-grid').innerHTML = `<div style="grid-column:1/-1;color:var(--muted);padding:16px;">⏳ Searching…</div>`;
  try {
    const d = await (await fetch('/api/sealed/search?' + new URLSearchParams({q}))).json();
    renderGrid(d.products || [], `Search: "${q}" — ${d.count} results`);
  } catch { renderGrid([], 'Search error'); }
}

async function openProduct(p) {
  document.getElementById('seal-detail').classList.remove('hidden');
  document.getElementById('sd-img').src = p.image || '';
  document.getElementById('sd-img').style.display = '';
  document.getElementById('sd-name').textContent = p.name;
  document.getElementById('sd-set').textContent = p.setName + (p.year ? ' (' + p.year + ')' : '') + ' · ' + p.type;
  document.getElementById('sd-tcg').textContent = money(p.marketPrice);
  document.getElementById('sd-tcg-lbl').textContent = p.priceType === 'listed' ? 'TCG LISTED' : 'TCG MARKET';
  document.getElementById('sd-ebay').textContent = '…';
  document.getElementById('sd-ebay-meta').textContent = 'loading eBay sold comps…';
  document.getElementById('sd-buy').href = `https://www.tcgplayer.com/product/${p.productId}`;
  document.getElementById('sd-sales').innerHTML = '';
  if (sdChart) { sdChart.destroy(); sdChart = null; }
  document.getElementById('sd-empty').classList.add('hidden');

  try {
    const d = await (await fetch('/api/sealed/price?' + new URLSearchParams({product_id: p.productId, name: p.name}))).json();
    renderHistory(d.history || []);
    const eb = d.ebay;
    if (eb && eb.median != null) {
      document.getElementById('sd-ebay').textContent = money(eb.median);
      document.getElementById('sd-ebay-meta').textContent =
        `${eb.sampleSize} sold${eb.lowConfidence ? ' · low confidence' : ''} · ${eb.rejected} rejected`;
      document.getElementById('sd-sales').innerHTML = (eb.sales || []).map(s =>
        `<div style="display:flex;gap:8px;padding:5px 0;border-top:1px solid var(--border);font-size:12px;align-items:center;">
          <a href="${esc(s.url)}" target="_blank" class="flex-1 truncate" style="color:var(--blue)" title="${esc(s.title)}">${esc((s.title||'').slice(0,44))}…</a>
          <span style="color:var(--muted);font-size:10px;">${esc((s.date||'').slice(0,10))}</span>
          <span style="font-weight:700;">${money(s.price)}</span>
        </div>`).join('') || `<div style="color:var(--muted);font-size:12px;padding:8px 0;">No sold rows.</div>`;
    } else {
      document.getElementById('sd-ebay').textContent = '—';
      document.getElementById('sd-ebay-meta').textContent = eb && eb.noRecentComps
        ? 'no recent comps (rare/older product)' : 'no verified comps';
    }
  } catch {
    document.getElementById('sd-ebay-meta').textContent = 'error loading comps';
  }
}

function renderHistory(history) {
  const empty = document.getElementById('sd-empty');
  if (sdChart) { sdChart.destroy(); sdChart = null; }
  if (history.length < 2) { empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');
  const pts = history.map(h => ({x: new Date(h.date).getTime(), y: h.price}));
  sdChart = new Chart(document.getElementById('sd-chart').getContext('2d'), {
    type:'line', data:{datasets:[{data:pts, borderColor:'#2563EB', borderWidth:2.5, pointRadius:0,
      pointHoverRadius:5, fill:true, tension:0.35,
      backgroundColor:c=>{const a=c.chart.chartArea; if(!a) return '#2563EB11';
        const g=c.chart.ctx.createLinearGradient(0,a.top,0,a.bottom); g.addColorStop(0,'#2563EB30'); g.addColorStop(1,'#2563EB02'); return g;}}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
      tooltip:{callbacks:{title:i=>new Date(i[0].parsed.x).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}),
        label:c=>'Market: '+money(c.parsed.y)}}},
      scales:{x:{type:'linear',grid:{color:'#EEF2F6'},ticks:{color:'#94A3B8',maxTicksLimit:6,font:{size:11},
        callback:v=>new Date(v).toLocaleDateString('en-US',{month:'short',day:'numeric'})}},
        y:{grid:{color:'#EEF2F6'},ticks:{color:'#94A3B8',font:{size:11},callback:v=>'$'+(v>=1000?(v/1000).toFixed(1)+'k':v.toFixed(0))}}}}});
}

initSets();
</script>
</body>
</html>
